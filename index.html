<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathFeedback</title>
  <meta name="description" content="MathFeedback support and privacy information.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #171923;
      --muted: #5b6272;
      --accent: #4f46e5;
      --border: #e4e7ef;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101116;
        --panel: #181a22;
        --text: #f2f4f8;
        --muted: #a8adba;
        --accent: #8b8cff;
        --border: #2a2d38;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      background: var(--bg);
      color: var(--text);
    }
    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 12px 40px rgb(0 0 0 / 0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: 0;
    }
    p { color: var(--muted); margin: 0 0 20px; }
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
    }
    a.button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>MathFeedback</h1>
      <p>Local-first after-class feedback records for high-school mathematics teachers and tutors.</p>
      <p>This site provides the public privacy policy and support information required for App Store review.</p>
      <nav aria-label="MathFeedback links">
        <a class="button primary" href="./privacy.html">Privacy Policy</a>
        <a class="button" href="./support.html">Support</a>
      </nav>
    </section>
    <footer>
      Contact: <a href="mailto:jack_huang28@foxmail.com">jack_huang28@foxmail.com</a>
    </footer>
  </main>
</body>
</html>
